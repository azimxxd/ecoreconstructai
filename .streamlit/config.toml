# EcoReconstruct AI — pinned light "Eco-Tech" theme so the design system
# stays consistent regardless of the device's dark-mode preference.
[theme]
base = "light"
primaryColor = "#40916C"
backgroundColor = "#FBFDFC"
secondaryBackgroundColor = "#EAF4EE"
textColor = "#14281F"

[server]
headless = true

[browser]
gatherUsageStats = false
