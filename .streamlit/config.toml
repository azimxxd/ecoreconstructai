# EcoReconstruct AI — pinned dark "City Scanner" theme (deep forest-black
# canvas + chlorophyll lime accent) so the design is identical everywhere.
[theme]
base = "dark"
primaryColor = "#A8FF60"
backgroundColor = "#060D09"
secondaryBackgroundColor = "#0D1A12"
